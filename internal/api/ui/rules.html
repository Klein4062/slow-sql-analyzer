<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分析规则说明 · Slow SQL Analyzer</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --panel-2:#1c2330; --border:#30363d;
    --text:#c9d1d9; --text-dim:#8b949e; --accent:#2f81f7;
    --critical:#f85149; --warning:#d29922; --info:#58a6ff; --ok:#3fb950;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
  header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  header h1 { margin:0; font-size:18px; font-weight:600; }
  header .sub { color:var(--text-dim); font-size:13px; }
  header a { color:var(--accent); font-size:13px; text-decoration:none; }
  header a:hover { text-decoration:underline; }
  main { max-width:1000px; margin:0 auto; padding:24px; }
  .intro { color:var(--text-dim); font-size:13px; margin-bottom:20px; }
  section { margin-bottom:30px; }
  h2 { font-size:15px; font-weight:600; margin:0 0 4px; display:flex; align-items:center; gap:10px; }
  h2 .pill { font-size:12px; font-weight:400; padding:2px 10px; border-radius:999px; border:1px solid var(--border); color:var(--text-dim); }
  .desc { color:var(--text-dim); font-size:13px; margin:0 0 14px; }

  .card { background:var(--panel); border:1px solid var(--border); border-left-width:3px; border-radius:6px; padding:14px 16px; margin-bottom:10px; }
  .card.common { border-left-color:var(--accent); }
  .card.live   { border-left-color:var(--critical); }
  .card.offline{ border-left-color:var(--warning); }
  .card .top { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  .card .name { font:13px var(--mono); color:var(--accent); }
  .card .title { font-weight:600; }
  .card .row { font-size:13px; margin:3px 0; }
  .card .row .k { color:var(--text-dim); display:inline-block; width:56px; }
  .card .note { color:var(--text-dim); font-size:12px; margin-top:6px; }
  .loading { color:var(--text-dim); padding:40px; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>分析规则说明</h1>
  <span class="sub">通用 / 实时独有 / 离线独有</span>
  <a href="/">&larr; 返回分析器</a>
</header>
<main>
  <p class="intro">共 <b id="count">…</b> 条规则。通用规则在离线与实时两种模式都生效（部分需要计划带 ANALYZE 统计）；实时独有依赖连库查系统表，离线独有是实时做不到的降级/推断行为。</p>
  <div id="root"><div class="loading">加载中…</div></div>
</main>
<script>
const SECTIONS = [
  { cat:'common',  title:'通用规则',  pill:'离线 + 实时', desc:'两种模式都生效。仅依赖计划字段的规则随时生效；标注「需 ANALYZE」的规则在实时模式默认启用，离线模式需导出计划时带 ANALYZE。' },
  { cat:'live',    title:'实时分析独有', pill:'仅实时 pgx', desc:'依赖连库查询系统表（如 pg_stat_user_tables），离线/命令连接器模式无此数据，不会触发。' },
  { cat:'offline', title:'离线分析独有', pill:'仅离线/命令', desc:'实时模式不会走到的降级或推断行为（无数据库连接时仍能给出提示）。' },
];

async function load() {
  const r = await fetch('/v1/rules');
  const rules = await r.json();
  document.getElementById('count').textContent = rules.length;
  const root = document.getElementById('root');
  root.innerHTML = '';
  for (const s of SECTIONS) {
    const items = rules.filter(x => x.category === s.cat);
    if (!items.length) continue;
    const sec = document.createElement('section');
    sec.innerHTML = `<h2>${s.title} <span class="pill">${s.pill}</span></h2><p class="desc">${s.desc}</p>`;
    for (const it of items) {
      const card = document.createElement('div');
      card.className = 'card ' + it.category;
      card.innerHTML =
        `<div class="top"><span class="name">${esc(it.name)}</span><span class="title">${esc(it.title)}</span></div>` +
        `<div class="row"><span class="k">触发</span>${esc(it.trigger)}</div>` +
        `<div class="row"><span class="k">建议</span>${esc(it.suggestion)}</div>` +
        (it.note ? `<div class="note">${esc(it.note)}</div>` : '');
      sec.appendChild(card);
    }
    root.appendChild(sec);
  }
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
load();
</script>
</body>
</html>
